name: Sync X Library Feed

on:
  schedule:
    - cron: "17 * * * *"
    - cron: "47 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-x-library-feed
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync bookmarks and favorites
        env:
          X_USER_ACCESS_TOKEN_1: ${{ secrets.X_USER_ACCESS_TOKEN_1 }}
          X_REFRESH_TOKEN_1: ${{ secrets.X_REFRESH_TOKEN_1 }}
          X_CLIENT_ID_1: ${{ secrets.X_CLIENT_ID_1 }}
          X_CLIENT_SECRET_1: ${{ secrets.X_CLIENT_SECRET_1 }}
          X_USER_ACCESS_TOKEN_2: ${{ secrets.X_USER_ACCESS_TOKEN_2 }}
          X_REFRESH_TOKEN_2: ${{ secrets.X_REFRESH_TOKEN_2 }}
          X_CLIENT_ID_2: ${{ secrets.X_CLIENT_ID_2 }}
          X_CLIENT_SECRET_2: ${{ secrets.X_CLIENT_SECRET_2 }}
          X_LIBRARY_MAX_PAGES: ${{ vars.X_LIBRARY_MAX_PAGES || '5' }}
          X_THREAD_MAX_FETCHES: ${{ vars.X_THREAD_MAX_FETCHES || '40' }}
          PUBLIC_BASE_URL: ${{ vars.PUBLIC_BASE_URL || 'https://raw.githubusercontent.com/vorbei/x-library-feed/main' }}
          X_TOKEN_STATE_FILE: ${{ runner.temp }}/rotated_tokens.env
        run: |
          if [ -z "$X_USER_ACCESS_TOKEN_1" ] && [ -z "$X_REFRESH_TOKEN_1" ]; then
            echo "::warning::Account 1 X secrets are not set; skipping sync."
            exit 0
          fi
          if [ -z "$X_USER_ACCESS_TOKEN_2" ] && [ -z "$X_REFRESH_TOKEN_2" ]; then
            echo "::warning::Account 2 X secrets are not set; skipping sync."
            exit 0
          fi
          : > "$X_TOKEN_STATE_FILE"
          python3 scripts/sync_x_library.py \
            --auth-mode oauth \
            --account "643123:chumsdock:chumsdock:1" \
            --account "2017610375295086592:CatHanami97880:CatHanami97880:2"

      - name: Persist rotated refresh tokens
        if: always()
        env:
          GH_TOKEN: ${{ secrets.SECRETS_WRITE_PAT }}
          STATE_FILE: ${{ runner.temp }}/rotated_tokens.env
        run: |
          if [ ! -s "$STATE_FILE" ]; then
            echo "No rotated tokens to persist."
            exit 0
          fi
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::Rotated tokens present but SECRETS_WRITE_PAT is not set; next run will 401."
            cat "$STATE_FILE" | sed 's/=.*$/=<redacted>/'
            exit 1
          fi
          while IFS='=' read -r key value; do
            [ -z "$key" ] && continue
            printf '%s' "$value" | gh secret set "$key" --repo "$GITHUB_REPOSITORY"
            echo "Updated secret $key"
          done < "$STATE_FILE"

      - name: Commit updated feed
        run: |
          if git diff --quiet -- public/x-bookmarks-favorites.md public/x-bookmarks-favorites.json archive/x-bookmarks-favorites rss.xml; then
            echo "No X library changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/x-bookmarks-favorites.md public/x-bookmarks-favorites.json archive/x-bookmarks-favorites rss.xml
          git commit -m "Update X library feed"
          git push
