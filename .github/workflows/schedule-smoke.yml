name: Schedule Smoke Test

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Print schedule context
        run: |
          echo "event=${{ github.event_name }}"
          echo "sha=${{ github.sha }}"
          date -u '+utc=%Y-%m-%dT%H:%M:%SZ'
