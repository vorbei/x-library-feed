name: Translate Feed

on:
  schedule:
    # Every 6 hours; runs at :05 to avoid colliding with sync's :17.
    - cron: "5 0,6,12,18 * * *"
  workflow_dispatch:
    inputs:
      priority_id:
        description: "Comma-separated item ids to translate first (bypasses max-calls)."
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: translate-x-library-feed
  cancel-in-progress: false

jobs:
  translate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Translate English content via DeepSeek
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_TRANSLATE_MAX_CALLS: ${{ vars.DEEPSEEK_TRANSLATE_MAX_CALLS || '150' }}
          DEEPSEEK_MODEL: ${{ vars.DEEPSEEK_MODEL || 'deepseek-chat' }}
          TRANSLATE_PRIORITY_IDS: ${{ inputs.priority_id }}
        run: |
          if [ -z "$DEEPSEEK_API_KEY" ]; then
            echo "::warning::DEEPSEEK_API_KEY not set; skipping translation."
            exit 0
          fi
          python3 scripts/translate_feed.py

      - name: Commit translations
        run: |
          PATHS="public/x-bookmarks-favorites.json public/feed-recent.json public/feed-archive.json public/feed-poche.json"
          if git diff --quiet -- $PATHS; then
            echo "No translation changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Translate runs take 5–60 min. Sync X Library Feed (and Sync Poche
          # Feed) push to the same JSON files on their own cadence, so by the
          # time we're ready to commit, origin/main has very likely moved.
          # A plain `git pull --rebase` produces content-level conflicts in
          # the JSON that git can't resolve, and the whole run is discarded.
          # Instead: snapshot our translated files, reset to fresh
          # origin/main, then re-apply ONLY the translation-shaped fields
          # (*_zh / *_zh_hash / *_translator_v) onto the fresh state. This
          # is loss-free regardless of what sync pushed in the meantime.
          for attempt in 1 2 3 4 5; do
            for f in $PATHS; do
              [ -f "$f" ] && cp "$f" "$f.translated"
            done
            git fetch origin main
            git reset --hard origin/main
            python3 scripts/merge_translations.py
            for f in $PATHS; do rm -f "$f.translated"; done
            if git diff --quiet -- $PATHS; then
              echo "No translation changes after merge onto fresh main (attempt $attempt)."
              exit 0
            fi
            git add $PATHS
            git commit -m "Translate feed content via DeepSeek"
            if git push; then
              echo "Pushed on attempt $attempt"
              exit 0
            fi
            echo "Push attempt $attempt failed; will re-merge onto newer origin/main"
          done
          echo "::error::All push attempts failed"
          exit 1
