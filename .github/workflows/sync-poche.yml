name: Sync Poche Feed

on:
  schedule:
    # Every 4 hours at :43 — between sync-x-library (:17) and translate-feed (:05).
    - cron: "43 0,4,8,12,16,20 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-poche-feed
  cancel-in-progress: false

jobs:
  sync-poche:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install content-extraction deps
        run: pip install --quiet trafilatura

      - name: Pull poche.app/explore feed
        env:
          POCHE_MAX_ITEMS: ${{ vars.POCHE_MAX_ITEMS || '2500' }}
          POCHE_PAGE_SIZE: ${{ vars.POCHE_PAGE_SIZE || '100' }}
          POCHE_MAX_FETCHES: ${{ vars.POCHE_MAX_FETCHES || '150' }}
          # Reuse the same CF Browser Rendering credentials as sync_x_library
          # so SPA pages (and X article URLs) actually return body content.
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          X_COOKIES_JSON: ${{ secrets.X_COOKIES_JSON }}
        run: python3 scripts/sync_poche.py

      - name: Commit poche feed
        run: |
          if git diff --quiet -- public/feed-poche.json; then
            echo "No poche changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Sync Poche Feed takes ~15 min. Translate Feed can finish and
          # push translation-field updates to feed-poche.json during that
          # window. A `git pull --rebase` then hits content-level JSON
          # conflicts git can't resolve, and the whole sync run is lost
          # (see run 26014267321). Instead: snapshot our update, reset to
          # fresh origin/main, then run scripts/merge_poche.py which keeps
          # our content mutations and re-applies any translation fields
          # origin/main has accumulated.
          for attempt in 1 2 3 4 5; do
            cp public/feed-poche.json public/feed-poche.json.poche-update
            git fetch origin main
            git reset --hard origin/main
            python3 scripts/merge_poche.py
            rm -f public/feed-poche.json.poche-update
            if git diff --quiet -- public/feed-poche.json; then
              echo "No poche changes after merge onto fresh main (attempt $attempt)."
              exit 0
            fi
            git add public/feed-poche.json
            git commit -m "Update poche feed"
            if git push; then
              echo "Pushed on attempt $attempt"
              exit 0
            fi
            echo "Push attempt $attempt failed; will re-merge onto newer origin/main"
          done
          echo "::error::All push attempts failed"
          exit 1
