<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>X Bookmarks + Favorites</title>
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.8/dist/purify.min.js"></script>
<style>
  :root {
    color-scheme: light dark;
    --bg: #fafafa;
    --card: #fff;
    --fg: #1a1a1a;
    --muted: #6a6a6a;
    --link: #1d6fec;
    --border: #e5e5e5;
    --accent: #f7f7f7;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #14171a;
      --card: #1c1f23;
      --fg: #e6e6e6;
      --muted: #8a8f97;
      --link: #6aa6ff;
      --border: #2a2f36;
      --accent: #22262c;
    }
  }
  html, body { background: var(--bg); color: var(--fg); height: 100%; }
  body {
    font: 15px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Roboto, sans-serif;
    margin: 0;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }
  /* Top bar */
  .topbar {
    flex: 0 0 auto;
    display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
  }
  .topbar h1 { font-size: 16px; margin: 0; margin-right: 8px; }
  .meta { color: var(--muted); font-size: 12px; }
  .meta a { color: var(--muted); }
  .topbar button {
    border: 1px solid var(--border); background: var(--card); color: var(--fg);
    padding: 5px 10px; border-radius: 999px; font-size: 12px; cursor: pointer;
  }
  .topbar button.active { background: var(--fg); color: var(--bg); border-color: var(--fg); }
  .search {
    flex: 1; min-width: 160px; padding: 5px 10px; font-size: 12px;
    border: 1px solid var(--border); border-radius: 999px;
    background: var(--card); color: var(--fg);
  }
  /* Three-pane layout */
  .panes {
    flex: 1; display: grid;
    grid-template-columns: 360px 480px 1fr;
    min-height: 0;
  }
  .list-pane, .summary-pane {
    border-right: 1px solid var(--border);
    overflow-y: auto;
    background: var(--bg);
  }
  .summary-pane { padding: 20px 24px 60px; }
  .full-pane {
    overflow-y: auto;
    padding: 20px 24px 80px;
    background: var(--accent);
  }
  .summary-pane .pane-inner, .full-pane .pane-inner {
    max-width: 680px; margin: 0 auto;
  }
  @media (max-width: 1280px) {
    .panes { grid-template-columns: 320px 1fr; }
    .full-pane { display: none; }
    .panes.show-full .summary-pane { display: none; }
    .panes.show-full .full-pane { display: block; }
  }
  @media (max-width: 720px) {
    .panes { grid-template-columns: 1fr; }
    .list-pane, .summary-pane { border-right: none; }
    .summary-pane, .full-pane { display: none; }
    .panes.reading .list-pane { display: none; }
    .panes.reading .summary-pane { display: block; }
    .panes.reading.show-full .summary-pane { display: none; }
    .panes.reading.show-full .full-pane { display: block; }
  }
  /* List item rows */
  .row {
    display: grid; grid-template-columns: 1fr auto; column-gap: 10px;
    padding: 12px 14px; border-bottom: 1px solid var(--border);
    cursor: pointer; background: var(--bg);
    transition: background 0.1s;
  }
  .row:hover { background: var(--accent); }
  .row.selected { background: var(--accent); border-left: 3px solid var(--link); padding-left: 11px; }
  .row .r-main { min-width: 0; }
  .row .r-author { font-weight: 600; font-size: 13px; }
  .row .r-author .handle { color: var(--muted); font-weight: 400; }
  .row .r-title { font-size: 14px; line-height: 1.4; margin-top: 2px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; word-break: break-word; }
  .row .r-meta { color: var(--muted); font-size: 11px; margin-top: 4px; display: flex; gap: 8px; flex-wrap: wrap; }
  .row .r-meta .src { padding: 1px 6px; border-radius: 4px; background: var(--accent); }
  .row.selected .r-meta .src { background: var(--card); }
  .row .r-thumb {
    width: 56px; height: 56px; border-radius: 6px;
    object-fit: cover; border: 1px solid var(--border);
    align-self: center;
  }
  .reader-empty {
    color: var(--muted); text-align: center;
    padding: 80px 24px; font-size: 14px;
  }
  .back-btn {
    display: none; margin-bottom: 16px; color: var(--link);
    cursor: pointer; font-size: 13px; background: none; border: none; padding: 0;
  }
  @media (max-width: 900px) {
    .back-btn { display: inline-block; }
  }
  /* Summary card (middle pane) */
  .summary-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px 20px; }
  .summary-card .gallery { margin-top: 12px; }
  .full-block { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px 20px; margin-bottom: 16px; }
  .full-block .lbl { color: var(--muted); font-size: 12px; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
  .full-block .full-title { font-size: 15px; font-weight: 600; margin-bottom: 8px; }
  .full-block .full-title a { color: var(--fg); text-decoration: none; }
  .full-block .full-title a:hover { text-decoration: underline; }
  .full-empty { color: var(--muted); text-align: center; padding: 60px 24px; font-size: 13px; }
  .show-full-btn {
    display: none;
    margin: 12px 0; padding: 6px 14px;
    background: var(--link); color: white; border: none;
    border-radius: 999px; font-size: 13px; cursor: pointer;
  }
  .actions { display: flex; gap: 8px; margin-top: 12px; align-items: center; flex-wrap: wrap; }
  .actions .act {
    border: 1px solid var(--border); background: var(--card); color: var(--fg);
    padding: 5px 12px; border-radius: 999px; font-size: 13px; cursor: pointer;
  }
  .actions .act:hover { background: var(--accent); }
  .actions .act.on { background: var(--link); color: white; border-color: var(--link); }
  .actions .act.fav.on { background: #f59e0b; border-color: #f59e0b; color: white; }
  .actions .dwell-tag { color: var(--muted); font-size: 12px; margin-left: auto; }
  .row.fav .r-title::before { content: "★ "; color: #f59e0b; }
  .row .r-dwell { color: var(--muted); font-size: 10px; margin-left: 4px; }
  @media (max-width: 1280px) {
    .show-full-btn.has-content { display: inline-block; }
  }
  .head { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; }
  .author { font-weight: 600; }
  .author a { color: var(--muted); font-weight: 400; text-decoration: none; }
  .author a:hover { text-decoration: underline; }
  .time { color: var(--muted); font-size: 12px; }
  .sources { font-size: 11px; color: var(--muted); margin: 2px 0 12px; }
  blockquote {
    margin: 0 0 12px;
    padding: 8px 12px;
    border-left: 3px solid var(--border);
    color: var(--fg);
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .gallery {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 4px;
  }
  .gallery a {
    display: block; aspect-ratio: 1 / 1; overflow: hidden;
    border-radius: 6px; border: 1px solid var(--border);
    background: var(--accent);
  }
  .gallery img {
    width: 100%; height: 100%; object-fit: cover;
    transition: transform .2s ease;
  }
  .gallery a:hover img { transform: scale(1.04); }
  /* If only 1 or 2 images, let them stretch full width side-by-side */
  .gallery.count-1 { grid-template-columns: 1fr; }
  .gallery.count-2 { grid-template-columns: repeat(2, 1fr); }
  .linked, .ref-article {
    margin-top: 12px; padding: 10px 14px; background: var(--accent);
    border-radius: 8px; font-size: 14px;
  }
  .linked .lbl, .ref-article .lbl { color: var(--muted); font-size: 12px; margin-bottom: 4px; }
  .linked-title { font-weight: 500; }
  .excerpt { color: var(--muted); margin-top: 6px; white-space: pre-wrap; }
  details { margin-top: 8px; }
  details summary { cursor: pointer; color: var(--link); font-size: 13px; }
  details > div { margin-top: 8px; padding: 8px 12px; border-left: 2px solid var(--border); color: var(--fg); }
  .md-body { font-size: 14px; line-height: 1.6; max-height: 700px; overflow-y: auto; }
  .md-body p { margin: 0 0 8px; }
  .md-body h1, .md-body h2, .md-body h3 { font-size: 15px; margin: 12px 0 6px; }
  .md-body ul, .md-body ol { margin: 0 0 8px; padding-left: 20px; }
  .md-body img { max-width: 100%; border-radius: 6px; margin: 12px auto; display: block; border: 1px solid var(--border); }
  .md-body a { color: var(--link); word-break: break-word; }
  .md-body blockquote { margin: 8px 0; padding: 4px 12px; border-left: 2px solid var(--border); color: var(--muted); }
  .md-body code { background: var(--accent); padding: 1px 4px; border-radius: 3px; font-size: 13px; }
  .md-body pre { background: var(--accent); padding: 8px 12px; border-radius: 4px; overflow-x: auto; }
  .lang-lbl { color: var(--muted); font-size: 11px; margin: 4px 0; text-transform: uppercase; letter-spacing: 0.05em; }
  /* Page embeds / preview cards for non-article linked URLs (github repo, landing pages, etc.). */
  .page-embed { position: relative; margin-top: 8px; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; background: var(--bg); }
  .page-embed iframe { display: block; width: 100%; height: 70vh; border: 0; background: var(--bg); }
  .page-embed .page-open-overlay {
    position: absolute; top: 8px; right: 8px;
    padding: 4px 10px; border-radius: 999px;
    background: rgba(0,0,0,0.65); color: #fff;
    font-size: 12px; text-decoration: none;
    backdrop-filter: blur(6px);
  }
  .page-embed .page-open-overlay:hover { background: rgba(0,0,0,0.85); }
  .page-card { display: flex; flex-direction: column; gap: 0; margin-top: 8px; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; background: var(--accent); }
  .page-card-link { display: flex; gap: 12px; padding: 12px; color: var(--fg); text-decoration: none; align-items: flex-start; }
  .page-card-link:hover { background: var(--bg); }
  .page-card-thumb { width: 96px; height: 96px; flex: 0 0 96px; object-fit: cover; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); }
  .page-card-body { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
  .page-card-host { color: var(--muted); font-size: 12px; text-transform: lowercase; }
  .page-card-title { font-size: 14px; font-weight: 600; word-break: break-word; }
  .page-card-desc { color: var(--muted); font-size: 13px; line-height: 1.45; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
  .page-card-cta { display: inline-block; padding: 6px 12px; margin: 0 12px 12px; align-self: flex-start; border-radius: 6px; background: var(--card); border: 1px solid var(--border); color: var(--link); text-decoration: none; font-size: 12px; }
  .page-card-cta:hover { background: var(--bg); }
  .metrics { color: var(--muted); font-size: 12px; margin-top: 10px; }
  .view-on-x { font-size: 12px; color: var(--link); text-decoration: none; }
  a { color: var(--link); }
  #empty { color: var(--muted); text-align: center; padding: 40px; }
</style>
</head>
<body>
<div class="topbar">
  <h1>X Bookmarks + Favorites</h1>
  <span class="meta" id="meta">Loading…</span>
  <button data-source="" class="active">All</button>
  <button data-source="bookmark@chumsdock">chumsdock bookmarks</button>
  <button data-source="favorite@chumsdock">chumsdock favs</button>
  <button data-source="bookmark@CatHanami97880">hanami bookmarks</button>
  <button data-source="favorite@CatHanami97880">hanami favs</button>
  <button id="fav-only">★ Favorites</button>
  <select id="lang" style="font-size:12px;padding:5px 10px;border-radius:999px;border:1px solid var(--border);background:var(--card);color:var(--fg);">
    <option value="auto">中文优先</option>
    <option value="both">中英对照</option>
    <option value="en">English only</option>
  </select>
  <input class="search" id="q" placeholder="Search…" />
</div>
<div class="panes" id="panes">
  <div class="list-pane" id="list"></div>
  <div class="summary-pane" id="summary">
    <div class="pane-inner">
      <div class="reader-empty">Pick an item on the left ←</div>
    </div>
  </div>
  <div class="full-pane" id="full">
    <div class="pane-inner">
      <div class="full-empty">Long-form content (X articles, linked content) shows here →</div>
    </div>
  </div>
</div>

<script>
const FEED_URL = "public/x-bookmarks-favorites.json";
// Phase 2: chunked layout. The viewer fetches the small index first so the
// list pane paints instantly, then lazy-loads the per-window detail bundles
// (article_text bodies, linked_content_by_url, referenced_articles_by_id)
// off the critical path. The legacy non-chunked file is detected at load
// time and handled inline.
const FEED_DETAIL_BASE = "public/";
let indexMeta = null;
const loadedDetailWindows = new Set();
const detailLoadPromises = {};

const esc = s => String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
const urlRE = /https?:\/\/[^\s<>"']+/g;
const linkify = s => esc(s).replace(urlRE, u => {
  const clean = u.replace(/[.,;:!?)]$/, "");
  const trailing = u.slice(clean.length);
  return `<a href="${clean}" target="_blank" rel="noopener">${clean}</a>${trailing}`;
});

// Pull all ![](url) and [](url) image URLs out of markdown so they can be
// promoted into the gallery. Returns {urls: [], stripped: markdownWithoutImages}.
function extractMarkdownImages(md) {
  const urls = [];
  const stripped = String(md || "").replace(/!\[[^\]]*\]\(([^)\s]+)(?:\s+"[^"]*")?\)/g, (_, u) => {
    // Skip svg emoji + tiny X chrome assets
    if (/abs\.twimg\.com\/emoji\//.test(u)) return "";
    urls.push(u);
    return "";
  });
  return { urls, stripped };
}

// Drop X navigation noise that always shows up in CF-rendered article markdown
function cleanArticleMarkdown(md) {
  return String(md || "")
    .replace(/##\s*\n+\s*To view keyboard shortcuts[^\n]*\n+(\[View keyboard shortcuts\][^\n]*\n+)?/g, "")
    .replace(/\[View keyboard shortcuts\]\([^)]+\)\n*/g, "")
    .replace(/\n{3,}/g, "\n\n")
    .trim();
}

const mdRenderer = window.marked && new window.marked.Renderer
  ? new window.marked.Renderer()
  : null;
if (window.marked) {
  marked.setOptions({ breaks: true, gfm: true });
}

let langMode = "auto"; // "auto" | "both" | "en"

// Pick which version of a body to show, given English original + optional ZH.
// Returns array of {label, text, isMarkdown}.
function pickBodies(en, zh, isMarkdown) {
  if (langMode === "en") return en ? [{label: "", text: en, isMarkdown}] : [];
  if (langMode === "both") {
    const out = [];
    if (zh) out.push({label: "中文", text: zh, isMarkdown});
    if (en) out.push({label: "English", text: en, isMarkdown});
    return out;
  }
  // auto: ZH if present, otherwise EN
  if (zh) return [{label: "", text: zh, isMarkdown}];
  return en ? [{label: "", text: en, isMarkdown}] : [];
}

function renderMarkdown(md) {
  if (!md) return "";
  if (!window.marked) return esc(md).replace(/\n/g, "<br/>");
  const html = marked.parse(md);
  if (window.DOMPurify) {
    return DOMPurify.sanitize(html, { ADD_ATTR: ["target"] });
  }
  return html;
}

// Collect every image URL referenced by an item across primary, linked, and
// referenced-tweet sources so the gallery can show a consolidated view.
function collectImages(item, refArticles) {
  const seen = new Set();
  const out = [];
  const push = u => { if (u && !seen.has(u)) { seen.add(u); out.push(u); } };
  for (const u of (item.image_urls || [])) push(u);
  for (const lc of linkedFor(item)) {
    for (const u of (lc.image_urls || [])) push(u);
    for (const u of extractMarkdownImages(lc.text_excerpt).urls) push(u);
  }
  for (const url of (item.primary_urls || [])) {
    const m = url.match(/^https?:\/\/(?:www\.)?(?:x\.com|twitter\.com)\/[^/i][^/]*\/(?:status|article)\/(\d+)/i);
    const ref = m ? lookupRef(m[1]) : null;
    if (!ref) continue;
    for (const u of (ref.image_urls || [])) push(u);
    for (const u of extractMarkdownImages(ref.article_text || "").urls) push(u);
  }
  return out;
}

// True if there is enough long-form content to justify showing the full pane.
function hasFullContent(item) {
  if ((item.article_text || "").trim()) return true;
  for (const url of (item.primary_urls || [])) {
    const m = url.match(/^https?:\/\/(?:www\.)?(?:x\.com|twitter\.com)\/[^/i][^/]*\/(?:status|article)\/(\d+)/i);
    const ref = m ? lookupRef(m[1]) : null;
    if (ref && ((ref.article_text || ref.text || "").trim())) return true;
  }
  for (const lc of linkedFor(item)) {
    if ((lc.text_excerpt || "").trim()) return true;
  }
  return false;
}

function renderSummary(item, refArticles) {
  const a = item.author || {};
  const name = esc(a.name || a.username || "unknown");
  const handle = esc(a.username || "unknown");
  const tweetUrl = item.url || "";
  const created = item.created_at ? new Date(item.created_at).toLocaleString() : "";
  const sources = (item.sources || []).map(s => esc(shortenSource(s))).join(" · ");
  const images = collectImages(item, refArticles);

  let html = `<div class="summary-card">`;
  html += `<div class="head">`;
  html += `<div><span class="author">${name}</span> <a href="https://x.com/${handle}" target="_blank">@${handle}</a></div>`;
  html += `<span class="time">${esc(created)}</span>`;
  html += `</div>`;
  html += `<div class="sources">${sources}</div>`;

  if (item.text) {
    html += `<blockquote>${linkify(item.text)}</blockquote>`;
  }

  // Brief teasers for content that lives in the full pane
  const teasers = [];
  if (item.article_url) {
    const t = esc(item.article_title || "X Article");
    teasers.push(`<div>📄 X Article: <a href="${esc(item.article_url)}" target="_blank">${t}</a></div>`);
  }
  for (const url of (item.primary_urls || [])) {
    const m = url.match(/^https?:\/\/(?:www\.)?(?:x\.com|twitter\.com)\/[^/i][^/]*\/(?:status|article)\/(\d+)/i);
    const ref = m ? lookupRef(m[1]) : null;
    if (!ref) continue;
    const isArticle = !!(ref.article_text || "").trim();
    const icon = isArticle ? "📄" : "💬";
    const kind = isArticle ? "Article" : "Tweet";
    const t = esc(ref.article_title || (isArticle ? "X Article" : "X Tweet"));
    const who = ref.author?.username ? ` (@${esc(ref.author.username)})` : "";
    teasers.push(`<div>${icon} Referenced X ${kind}${who}: <a href="${esc(ref.url || url)}" target="_blank">${t}</a></div>`);
  }
  let linkCount = 0;
  for (const lc of linkedFor(item)) {
    const u = lc.final_url || lc.url || "";
    if (!u || images.includes(u)) continue;
    if (/\.(jpg|jpeg|png|gif|webp|svg)(\?|$)/i.test(u)) continue;
    linkCount++;
  }
  if (linkCount) teasers.push(`<div>🔗 ${linkCount} linked source${linkCount > 1 ? "s" : ""}</div>`);
  if (teasers.length) {
    html += `<div style="font-size:13px;color:var(--muted);margin-top:8px">${teasers.join("")}</div>`;
  }

  if (hasFullContent(item)) {
    html += `<button class="show-full-btn has-content" id="show-full">Read full content →</button>`;
  }

  if (images.length) {
    const shown = images.slice(0, 9);
    const cls = shown.length <= 2 ? ` count-${shown.length}` : "";
    html += `<div class="gallery${cls}">`;
    for (const u of shown) {
      html += `<a href="${esc(u)}" target="_blank" rel="noopener"><img src="${esc(u)}" alt="" loading="lazy" /></a>`;
    }
    html += `</div>`;
  }

  // Metrics
  const m2 = item.public_metrics || {};
  const bits = [];
  if (m2.like_count) bits.push(`♥ ${m2.like_count.toLocaleString()}`);
  if (m2.retweet_count) bits.push(`🔁 ${m2.retweet_count.toLocaleString()}`);
  if (m2.reply_count) bits.push(`💬 ${m2.reply_count.toLocaleString()}`);
  if (m2.bookmark_count) bits.push(`🔖 ${m2.bookmark_count.toLocaleString()}`);
  if (m2.impression_count) bits.push(`👁 ${m2.impression_count.toLocaleString()}`);
  if (bits.length) html += `<div class="metrics">${bits.join(" · ")}</div>`;
  if (tweetUrl) html += `<div style="margin-top:8px"><a class="view-on-x" href="${esc(tweetUrl)}" target="_blank">View on X →</a></div>`;

  // User actions: favorite + thumbs
  const st = getItemState(item.id);
  const favCls = st.favorite ? " on" : "";
  const upCls = st.thumb === "up" ? " on" : "";
  const downCls = st.thumb === "down" ? " on" : "";
  const dwell = st.reading_seconds || 0;
  const dwellLabel = dwell ? `${dwell < 60 ? dwell + "s" : Math.round(dwell / 60) + "m"} read` : "";
  html += `<div class="actions">`;
  html += `<button class="act fav${favCls}" data-act="fav">★ ${st.favorite ? "Favorited" : "Favorite"}</button>`;
  html += `<button class="act${upCls}" data-act="up">👍</button>`;
  html += `<button class="act${downCls}" data-act="down">👎</button>`;
  if (dwellLabel) html += `<span class="dwell-tag">${dwellLabel}</span>`;
  html += `</div>`;
  html += `</div>`;
  return html;
}

function hostOf(url) {
  try { return new URL(url).host.replace(/^www\./, ""); } catch { return url; }
}

function pickPageThumb(lc) {
  const imgs = Array.isArray(lc.image_urls) ? lc.image_urls : [];
  for (const src of imgs) {
    if (!src) continue;
    if (/\.svg(\?|$)/i.test(src)) continue;
    if (/sprite|icon|favicon|logo|emoji|avatar/i.test(src)) continue;
    return src;
  }
  return imgs[0] || "";
}

function renderPageEmbed(lc, url) {
  const safeUrl = esc(url);
  const host = esc(hostOf(url));
  // frameable: true → iframe; false → preview card; null/undefined → preview
  //   card (we don't know if framing works, so don't risk a blank box).
  if (lc.frameable === true) {
    return (
      `<div class="page-embed">` +
        `<iframe src="${safeUrl}" loading="lazy" referrerpolicy="no-referrer" ` +
          `sandbox="allow-scripts allow-same-origin allow-popups allow-forms"></iframe>` +
        `<a class="page-open-overlay" href="${safeUrl}" target="_blank" rel="noopener">Open in tab ↗</a>` +
      `</div>`
    );
  }
  const thumb = pickPageThumb(lc);
  const thumbHtml = thumb
    ? `<img class="page-card-thumb" src="${esc(thumb)}" alt="" loading="lazy" referrerpolicy="no-referrer" onerror="this.remove()" />`
    : "";
  const titleText = lc.title || lc.description || url;
  const desc = (lc.description && lc.description !== lc.title) ? lc.description : "";
  return (
    `<div class="page-card">` +
      `<a class="page-card-link" href="${safeUrl}" target="_blank" rel="noopener">` +
        thumbHtml +
        `<div class="page-card-body">` +
          `<div class="page-card-host">${host}</div>` +
          `<div class="page-card-title">${esc(titleText)}</div>` +
          (desc ? `<div class="page-card-desc">${esc(desc)}</div>` : "") +
        `</div>` +
      `</a>` +
      `<a class="page-card-cta" href="${safeUrl}" target="_blank" rel="noopener">Open ${host} ↗</a>` +
    `</div>`
  );
}

function renderFull(item, refArticles) {
  const blocks = [];

  // Own article body — keep inline images (don't strip)
  if (item.article_url && (item.article_text || "").trim()) {
    const title = esc(item.article_title || item.article_url);
    const bodies = pickBodies(item.article_text, item.article_text_zh, true);
    let inner = "";
    for (const b of bodies) {
      const cleaned = cleanArticleMarkdown(b.text);
      const rendered = renderMarkdown(cleaned);
      const heading = b.label ? `<div class="lang-lbl">${b.label}</div>` : "";
      inner += heading + `<div class="md-body" style="max-height:none">${rendered}</div>`;
    }
    blocks.push(
      `<div class="full-block">` +
      `<div class="lbl">📄 X Article (own)</div>` +
      `<div class="full-title"><a href="${esc(item.article_url)}" target="_blank">${title}</a></div>` +
      inner +
      `</div>`
    );
  }

  // Referenced X article/tweet bodies
  for (const url of (item.primary_urls || [])) {
    const m = url.match(/^https?:\/\/(?:www\.)?(?:x\.com|twitter\.com)\/[^/i][^/]*\/(?:status|article)\/(\d+)/i);
    const ref = m ? lookupRef(m[1]) : null;
    if (!ref) continue;
    const articleText = (ref.article_text || "").trim();
    const tweetText = (ref.text || "").trim();
    const isArticle = !!articleText;
    if (!articleText && !tweetText) continue;
    const icon = isArticle ? "📄" : "💬";
    const kind = isArticle ? "Article" : "Tweet";
    // Tweets don't have a real title — use the first non-URL chunk of body
    // (max ~80 chars) so the heading is something readable instead of
    // generic "X Tweet".
    let computedTitle = ref.article_title;
    if (!computedTitle) {
      if (isArticle) {
        computedTitle = "X Article";
      } else {
        const stripped = tweetText.replace(/https?:\/\/\S+/g, "").trim().replace(/\s+/g, " ");
        computedTitle = stripped.slice(0, 80) || "X Tweet";
        if (stripped.length > 80) computedTitle += "…";
      }
    }
    const title = esc(computedTitle);
    const who = ref.author?.username ? ` (@${esc(ref.author.username)})` : "";
    const enText = isArticle ? articleText : tweetText;
    const zhText = isArticle ? (ref.article_text_zh || "") : (ref.text_zh || "");
    const bodies = pickBodies(enText, zhText, isArticle);
    let inner = "";
    for (const b of bodies) {
      // Keep inline images in article markdown so the full pane is a real
      // article view. Plain tweet text just gets linkified.
      const cleaned = isArticle ? cleanArticleMarkdown(b.text) : b.text;
      const rendered = isArticle ? renderMarkdown(cleaned) : linkify(cleaned);
      const heading = b.label ? `<div class="lang-lbl">${b.label}</div>` : "";
      inner += heading + `<div class="md-body" style="max-height:none">${rendered}</div>`;
    }
    blocks.push(
      `<div class="full-block">` +
      `<div class="lbl">${icon} Referenced X ${kind}${who}</div>` +
      `<div class="full-title"><a href="${esc(ref.url || url)}" target="_blank">${title}</a></div>` +
      inner +
      `</div>`
    );
  }

  // Linked content — article kinds render as markdown, page kinds as iframe or
  // preview card depending on `frameable`. See classify_link / _is_frameable in
  // scripts/sync_x_library.py for how those fields are populated.
  const images = collectImages(item, refArticles);
  for (const lc of linkedFor(item)) {
    const u = lc.final_url || lc.url || "";
    if (!u || images.includes(u)) continue;
    if (/\.(jpg|jpeg|png|gif|webp|svg)(\?|$)/i.test(u)) continue;
    const kind = lc.kind || "unknown";
    if (kind === "image") continue;
    const rawTitle = lc.title || lc.description;
    const titleHtml = rawTitle && rawTitle.trim() && rawTitle.trim() !== u ? esc(rawTitle) : esc(u);

    if (kind === "page") {
      const inner = renderPageEmbed(lc, u);
      blocks.push(
        `<div class="full-block">` +
        `<div class="lbl">🔗 Linked page</div>` +
        `<div class="full-title"><a href="${esc(u)}" target="_blank">${titleHtml}</a></div>` +
        inner +
        `</div>`
      );
      continue;
    }

    // article + unknown → markdown rendering (current behavior)
    if (!(lc.text_excerpt || "").trim()) continue;
    const bodies = pickBodies(lc.text_excerpt, lc.text_excerpt_zh || "", true);
    let inner = "";
    for (const b of bodies) {
      const cleaned = cleanArticleMarkdown(b.text);
      const rendered = renderMarkdown(cleaned);
      const heading = b.label ? `<div class="lang-lbl">${b.label}</div>` : "";
      inner += heading + `<div class="md-body" style="max-height:none">${rendered}</div>`;
    }
    blocks.push(
      `<div class="full-block">` +
      `<div class="lbl">🔗 Linked content</div>` +
      `<div class="full-title"><a href="${esc(u)}" target="_blank">${titleHtml}</a></div>` +
      inner +
      `</div>`
    );
  }

  if (!blocks.length) {
    return `<div class="full-empty">No long-form content for this item.</div>`;
  }
  return blocks.join("");
}

let allItems = [];
let refArticles = {};
let linkedByUrl = {};
let itemsById = {};
let currentFilter = "";
let currentQuery = "";

// Resolve an item's linked content entries. Prefers the new shape
// (`linked_content_urls` + a global `linked_content_by_url` dict) and falls
// back to the legacy embedded `linked_content` list. Stale data from before
// the sync schema split keeps rendering correctly during the transition.
function linkedFor(item) {
  const out = [];
  const seen = new Set();
  for (const u of (item.linked_content_urls || [])) {
    if (seen.has(u)) continue;
    seen.add(u);
    const entry = linkedByUrl[u];
    if (entry) out.push(entry);
  }
  for (const entry of (item.linked_content || [])) {
    const u = entry.url || entry.final_url || "";
    if (u && seen.has(u)) continue;
    if (u) seen.add(u);
    out.push(entry);
  }
  return out;
}

// Build a synthetic "referenced article" entry from one of our own items so
// the viewer can render a body when the bookmark links to another tweet that
// we also already have in the feed.
function itemAsRef(it) {
  if (!it) return null;
  const a = it.author || {};
  return {
    id: it.id,
    url: it.url || `https://x.com/${a.username || ""}/status/${it.id}`,
    author: { username: a.username || "", name: a.name || "" },
    text: it.text || "",
    article_title: it.article_title || null,
    article_text: it.article_text || "",
    image_urls: it.image_urls || [],
  };
}

function lookupRef(tid) {
  if (refArticles[tid]) return refArticles[tid];
  if (itemsById[tid]) return itemAsRef(itemsById[tid]);
  return null;
}

let selectedId = null;
let filteredItems = [];

// ---- User state (favorites / thumbs / reading time) ----
const STATE_URL = localStorage.getItem("X_STATE_URL") || "";
const STATE_TOKEN = localStorage.getItem("X_STATE_TOKEN") || "";
let userState = JSON.parse(localStorage.getItem("X_USER_STATE_CACHE") || '{"items":{}}');
let pendingPatches = {}; // { tweet_id: {favorite?, thumb?, reading_seconds?, last_read_at?} }
let dwellStartedAt = 0;  // ms timestamp when current selection started being read
let dwellItemId = null;  // which item the timer is counting for

function getItemState(id) {
  return (userState.items && userState.items[id]) || {};
}

function flushPendingPatchesSoon() {
  clearTimeout(flushPendingPatchesSoon._t);
  flushPendingPatchesSoon._t = setTimeout(flushPendingPatches, 1500);
}

async function flushPendingPatches() {
  if (!Object.keys(pendingPatches).length) return;
  // Always persist locally first
  for (const [id, patch] of Object.entries(pendingPatches)) {
    const cur = userState.items[id] || {};
    const next = { ...cur };
    if (patch.favorite !== undefined) next.favorite = patch.favorite;
    if (patch.thumb !== undefined) next.thumb = patch.thumb;
    if (typeof patch.reading_seconds === "number") {
      next.reading_seconds = Math.max(cur.reading_seconds || 0, patch.reading_seconds);
    }
    if (patch.last_read_at) next.last_read_at = patch.last_read_at;
    userState.items[id] = next;
  }
  localStorage.setItem("X_USER_STATE_CACHE", JSON.stringify(userState));
  const payload = { items: pendingPatches };
  pendingPatches = {};
  if (!STATE_URL || !STATE_TOKEN) return; // offline-only mode
  try {
    const resp = await fetch(STATE_URL, {
      method: "POST",
      headers: {
        "Authorization": `Bearer ${STATE_TOKEN}`,
        "Content-Type": "application/json",
      },
      body: JSON.stringify(payload),
    });
    if (resp.ok) {
      const merged = await resp.json();
      userState = merged;
      localStorage.setItem("X_USER_STATE_CACHE", JSON.stringify(userState));
    }
  } catch (e) {
    console.warn("state sync failed", e);
  }
}

function queuePatch(id, patch) {
  pendingPatches[id] = { ...(pendingPatches[id] || {}), ...patch };
  flushPendingPatchesSoon();
}

async function loadUserState() {
  if (!STATE_URL || !STATE_TOKEN) return;
  try {
    const resp = await fetch(STATE_URL, {
      headers: { "Authorization": `Bearer ${STATE_TOKEN}` },
    });
    if (resp.ok) {
      userState = await resp.json();
      localStorage.setItem("X_USER_STATE_CACHE", JSON.stringify(userState));
    }
  } catch (e) {
    console.warn("state load failed", e);
  }
}

function stopDwellTimer() {
  if (!dwellItemId || !dwellStartedAt) return;
  const seconds = Math.round((Date.now() - dwellStartedAt) / 1000);
  if (seconds >= 2 && seconds <= 60 * 60) {
    const prev = (getItemState(dwellItemId).reading_seconds) || 0;
    queuePatch(dwellItemId, {
      reading_seconds: prev + seconds,
      last_read_at: new Date().toISOString(),
    });
  }
  dwellItemId = null;
  dwellStartedAt = 0;
}

function startDwellTimer(id) {
  stopDwellTimer();
  dwellItemId = id;
  dwellStartedAt = Date.now();
}

window.addEventListener("beforeunload", () => {
  stopDwellTimer();
  flushPendingPatches();
});
document.addEventListener("visibilitychange", () => {
  if (document.hidden) {
    stopDwellTimer();
    flushPendingPatches();
  } else if (selectedId) {
    startDwellTimer(selectedId);
  }
});

function toggleFavorite(id) {
  const cur = getItemState(id);
  queuePatch(id, { favorite: !cur.favorite });
  userState.items[id] = { ...cur, favorite: !cur.favorite };
  renderReader();
  // Update the row star
  const row = document.querySelector(`.row[data-id="${id}"]`);
  if (row) row.classList.toggle("fav", !!userState.items[id].favorite);
}

function setThumb(id, value) {
  const cur = getItemState(id);
  const next = cur.thumb === value ? null : value;
  queuePatch(id, { thumb: next });
  userState.items[id] = { ...cur, thumb: next };
  renderReader();
}

// Pick a short title for the list row, mirroring server-side best_item_title.
function rowTitle(item) {
  if (item.article_title) return item.article_title;
  const stripped = (item.text || "").replace(/https?:\/\/\S+/g, "").trim();
  if (stripped) return stripped;
  for (const url of (item.primary_urls || [])) {
    const m = url.match(/^https?:\/\/(?:www\.)?(?:x\.com|twitter\.com)\/[^/i][^/]*\/(?:status|article)\/(\d+)/i);
    const ref = m ? (refArticles[m[1]] || itemsById[m[1]]) : null;
    if (ref) {
      if (ref.article_title) return ref.article_title;
      if (ref.text) return ref.text.replace(/https?:\/\/\S+/g, "").trim();
    }
  }
  return (item.primary_urls || [])[0] || "(no text)";
}

function shortenSource(s) {
  return s.replace("bookmark@", "🔖 ").replace("favorite@", "♥ ").replace("CatHanami97880", "hanami");
}

function renderRow(item) {
  const a = item.author || {};
  const name = esc(a.name || a.username || "?");
  const handle = esc(a.username || "?");
  const title = esc(rowTitle(item).slice(0, 220));
  // Pick a thumbnail
  let thumb = "";
  for (const u of (item.image_urls || [])) {
    if (!/abs\.twimg\.com\/emoji/.test(u)) { thumb = u; break; }
  }
  if (!thumb) {
    for (const lc of linkedFor(item)) {
      for (const u of (lc.image_urls || [])) {
        if (!/abs\.twimg\.com\/emoji/.test(u)) { thumb = u; break; }
      }
      if (thumb) break;
      const md = extractMarkdownImages(lc.text_excerpt || "").urls;
      if (md.length) { thumb = md[0]; break; }
    }
  }
  const sources = (item.sources || []).map(s => `<span class="src">${esc(shortenSource(s))}</span>`).join("");
  const date = item.created_at ? new Date(item.created_at).toLocaleDateString() : "";
  const sel = item.id === selectedId ? " selected" : "";
  const st = getItemState(item.id);
  const favCls = st.favorite ? " fav" : "";
  const thumbBadge = st.thumb === "up" ? " 👍" : st.thumb === "down" ? " 👎" : "";
  const dwell = st.reading_seconds || 0;
  const dwellSpan = dwell ? `<span class="r-dwell">· ${dwell < 60 ? dwell + "s" : Math.round(dwell / 60) + "m"}</span>` : "";
  return (
    `<div class="row${sel}${favCls}" data-id="${esc(item.id)}">` +
    `<div class="r-main">` +
      `<div class="r-author">${name} <span class="handle">@${handle}</span>${thumbBadge}</div>` +
      `<div class="r-title">${title}</div>` +
      `<div class="r-meta">${sources}<span>${esc(date)}${dwellSpan}</span></div>` +
    `</div>` +
    (thumb ? `<img class="r-thumb" src="${esc(thumb)}" alt="" loading="lazy" />` : "") +
    `</div>`
  );
}

let favOnly = false;
function renderList() {
  const list = document.getElementById("list");
  filteredItems = allItems.filter(item => {
    if (currentFilter && !(item.sources || []).includes(currentFilter)) return false;
    if (favOnly && !getItemState(item.id).favorite) return false;
    if (currentQuery) {
      const haystack = ((item.text || "") + " " + (item.author?.name || "") + " " + (item.author?.username || "")).toLowerCase();
      if (!haystack.includes(currentQuery)) return false;
    }
    return true;
  });
  if (!filteredItems.length) {
    list.innerHTML = '<div class="reader-empty">No matching items.</div>';
    return;
  }
  list.innerHTML = filteredItems.slice(0, 500).map(renderRow).join("");
  if (filteredItems.length > 500) {
    list.innerHTML += `<div class="reader-empty">… ${filteredItems.length - 500} more not shown</div>`;
  }
}

function renderReader() {
  const summaryInner = document.querySelector("#summary .pane-inner");
  const fullInner = document.querySelector("#full .pane-inner");
  if (!selectedId) {
    summaryInner.innerHTML = '<div class="reader-empty">Pick an item on the left ←</div>';
    fullInner.innerHTML = '<div class="full-empty">Long-form content shows here →</div>';
    return;
  }
  const item = itemsById[selectedId];
  if (!item) {
    summaryInner.innerHTML = '<div class="reader-empty">Item not found</div>';
    fullInner.innerHTML = "";
    return;
  }
  summaryInner.innerHTML =
    `<button class="back-btn" id="back-list">← Back to list</button>` +
    renderSummary(item, refArticles);
  fullInner.innerHTML =
    `<button class="back-btn" id="back-summary">← Back to summary</button>` +
    renderFull(item, refArticles);
  document.querySelector("#summary").scrollTop = 0;
  document.querySelector("#full").scrollTop = 0;

  const backList = document.getElementById("back-list");
  if (backList) backList.addEventListener("click", () => {
    document.getElementById("panes").classList.remove("reading", "show-full");
  });
  const backSummary = document.getElementById("back-summary");
  if (backSummary) backSummary.addEventListener("click", () => {
    document.getElementById("panes").classList.remove("show-full");
  });
  const showFull = document.getElementById("show-full");
  if (showFull) showFull.addEventListener("click", () => {
    document.getElementById("panes").classList.add("show-full");
    document.querySelector("#full").scrollTop = 0;
  });
}

function selectItem(id) {
  stopDwellTimer();
  selectedId = id;
  for (const r of document.querySelectorAll(".row")) {
    r.classList.toggle("selected", r.dataset.id === id);
  }
  document.getElementById("panes").classList.add("reading");
  renderReader();
  startDwellTimer(id);
  const item = itemsById[id];
  if (item) ensureDetailForItem(item).catch(() => {});
}

function applyFilters() {
  renderList();
  renderReader();
}

function mergeDetailBundle(bundle) {
  if (!bundle) return;
  const detailById = {};
  for (const it of (bundle.items || [])) {
    if (it && it.id) detailById[it.id] = it;
  }
  for (const it of allItems) {
    const d = detailById[it.id];
    if (!d) continue;
    if (d.article_text != null) it.article_text = d.article_text;
    if (d.article_text_zh != null) it.article_text_zh = d.article_text_zh;
    if (d.article_text_zh_hash != null) it.article_text_zh_hash = d.article_text_zh_hash;
  }
  Object.assign(linkedByUrl, bundle.linked_content_by_url || {});
  Object.assign(refArticles, bundle.referenced_articles_by_id || {});
}

function detailUrlFor(window) {
  const filename = (indexMeta && indexMeta.detail_files && indexMeta.detail_files[window]) ||
    (window === "recent" ? "feed-recent.json" : "feed-archive.json");
  return FEED_DETAIL_BASE + filename;
}

function loadDetailWindow(window) {
  if (loadedDetailWindows.has(window)) return Promise.resolve(null);
  if (detailLoadPromises[window]) return detailLoadPromises[window];
  detailLoadPromises[window] = fetch(detailUrlFor(window) + "?t=" + Date.now())
    .then(r => r.ok ? r.json() : Promise.reject(new Error(`HTTP ${r.status}`)))
    .then(bundle => {
      mergeDetailBundle(bundle);
      loadedDetailWindows.add(window);
      // Re-render the currently-open item so its full body shows up once
      // detail arrives.
      renderReader();
      return bundle;
    })
    .catch(err => {
      console.warn(`Failed to load ${window} detail bundle:`, err);
      delete detailLoadPromises[window];  // allow retry on next click
      throw err;
    });
  return detailLoadPromises[window];
}

function windowForItem(item) {
  if (!indexMeta || !indexMeta.recent_cutoff_at) return "recent";
  const ts = item.first_seen_at || item.last_seen_at || item.created_at || "";
  return ts >= indexMeta.recent_cutoff_at ? "recent" : "archive";
}

function ensureDetailForItem(item) {
  return loadDetailWindow(windowForItem(item));
}

Promise.all([
  fetch(FEED_URL + "?t=" + Date.now()).then(r => r.json()),
  loadUserState(),
])
  .then(([data]) => {
    const isChunked = (data.format || "").toLowerCase() === "feed-index/1";
    allItems = data.items || [];
    if (isChunked) {
      indexMeta = data;
      refArticles = {};
      linkedByUrl = {};
    } else {
      // Legacy single-file shape — still works.
      indexMeta = null;
      refArticles = data.referenced_articles_by_id || {};
      linkedByUrl = data.linked_content_by_url || {};
      loadedDetailWindows.add("recent");
      loadedDetailWindows.add("archive");
    }
    itemsById = Object.fromEntries(allItems.map(it => [it.id, it]));
    const updated = data.updated_at ? new Date(data.updated_at).toLocaleString() : "?";
    const synced = STATE_URL ? " · synced" : " · local-only";
    document.getElementById("meta").innerHTML =
      `${allItems.length} items · ${esc(updated)}${synced} · ` +
      `<a href="rss.xml">RSS</a> · <a href="public/x-bookmarks-favorites.md">MD</a> · <a href="public/x-bookmarks-favorites.json">JSON</a>`;
    applyFilters();
    // Kick off detail prefetch off the critical path. Recent first; archive
    // only fires when the user actually opens an older item.
    if (isChunked) loadDetailWindow("recent").catch(() => {});
  })
  .catch(err => {
    document.getElementById("list").innerHTML = '<div class="reader-empty">Failed to load feed: ' + esc(err.message) + '</div>';
  });

document.getElementById("list").addEventListener("click", e => {
  const row = e.target.closest(".row");
  if (row) selectItem(row.dataset.id);
});
document.getElementById("summary").addEventListener("click", e => {
  const btn = e.target.closest(".act");
  if (!btn || !selectedId) return;
  const act = btn.dataset.act;
  if (act === "fav") toggleFavorite(selectedId);
  else if (act === "up") setThumb(selectedId, "up");
  else if (act === "down") setThumb(selectedId, "down");
});
for (const btn of document.querySelectorAll(".topbar button[data-source]")) {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".topbar button[data-source]").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    currentFilter = btn.dataset.source;
    applyFilters();
  });
}
document.getElementById("q").addEventListener("input", e => {
  currentQuery = e.target.value.trim().toLowerCase();
  applyFilters();
});
document.getElementById("lang").addEventListener("change", e => {
  langMode = e.target.value;
  renderReader();
});
document.getElementById("fav-only").addEventListener("click", e => {
  favOnly = !favOnly;
  e.currentTarget.classList.toggle("active", favOnly);
  applyFilters();
});

// Keyboard nav: j/k = next/prev, Escape = back to list (mobile)
document.addEventListener("keydown", e => {
  if (["INPUT", "TEXTAREA", "SELECT"].includes(document.activeElement?.tagName)) return;
  if (e.key === "j" || e.key === "k") {
    if (!filteredItems.length) return;
    const idx = filteredItems.findIndex(it => it.id === selectedId);
    let next = e.key === "j" ? idx + 1 : idx - 1;
    if (next < 0) next = 0;
    if (next >= filteredItems.length) next = filteredItems.length - 1;
    const target = filteredItems[next];
    if (target) {
      selectItem(target.id);
      const row = document.querySelector(`.row[data-id="${target.id}"]`);
      if (row) row.scrollIntoView({ block: "nearest" });
    }
    e.preventDefault();
  } else if (e.key === "Escape") {
    document.getElementById("panes").classList.remove("reading");
  }
});
</script>
</body>
</html>
